# turbulence_strangle_tp_v1.toml
# ── Experiment: Short Strangle Turbulence TP — Candidate v1 ──────
#
# Step 2  (sensitivity):
#   python -m backtester.run --experiment turbulence_strangle_tp_v1 --mode sensitivity
#
# Step 3  (walk-forward validation):
#   python -m backtester.run --experiment turbulence_strangle_tp_v1 --mode wfo
#
# Candidate found from discovery run 2026-04-27 (1 combo, 2025-12-21 → 2026-04-21):
#   leg_type=strangle, dte=1, delta=0.15, entry_hour=19, stop_loss_pct=4.0,
#   take_profit_pct=0, max_hold_hours=0, skip_weekends=1,
#   min_otm_pct=2.5, turbulence_threshold=50

strategy = "turbulence_strangle_tp"

# ── Sensitivity analysis ─────────────────────────────────────────
[sensitivity]

steps = 5

[sensitivity.best]
leg_type             = "strangle"
dte                  = 1
delta                = 0.15
entry_hour           = 19
stop_loss_pct        = 4.0
take_profit_pct      = 0
max_hold_hours       = 0
skip_weekends        = 1
min_otm_pct          = 2.5
turbulence_threshold = 50

[sensitivity.deviation.leg_type]
type = "fixed"

[sensitivity.deviation.dte]
type = "fixed"

[sensitivity.deviation.delta]
type = "fixed"     # 0.15 is well-established; not swept

[sensitivity.deviation.entry_hour]
type = "fixed"     # 19 UTC fixed for this strategy

[sensitivity.deviation.stop_loss_pct]
type   = "pct"
amount = 15        # ±15% → [3.4, 3.7, 4.0, 4.3, 4.6]

[sensitivity.deviation.take_profit_pct]
type = "fixed"     # 0 = no TP (boundary value; can't go negative)

[sensitivity.deviation.max_hold_hours]
type = "fixed"     # 0 = hold to expiry

[sensitivity.deviation.skip_weekends]
type = "fixed"

[sensitivity.deviation.min_otm_pct]
type   = "abs"
amount = 0.5       # ±0.5% → [1.5, 2.0, 2.5, 3.0, 3.5]

[sensitivity.deviation.turbulence_threshold]
type   = "abs"
amount = 10        # ±10 → [30, 40, 50, 60, 70]


# ── Walk-forward validation ──────────────────────────────────────
[wfo]
is_days   = 60    # In-sample window (calendar days)
oos_days  = 20    # Out-of-sample window (calendar days)
step_days = 20    # Window shift per step
