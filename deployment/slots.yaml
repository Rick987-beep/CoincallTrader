# ===========================================================================
# CoincallTrader — Slot Registry
#
# Each slot is an isolated instance of the trading bot on the production
# server at /opt/ct/slot-XX/.  Configure slots here and deploy with:
#
#   ./deployment/deploy-slot.sh 01          Deploy to slot-01
#   ./deployment/deploy-slot.sh 01 --setup  First-time setup for slot-01
#   ./deployment/deploy-slot.sh status      Show all slot statuses
#
# Each slot requires a matching .env.slot-XX file in the project root
# (gitignored) containing API keys, strategy selection, etc.
#
# The DASHBOARD_PORT in each slot's .env is used for the minimal control
# endpoint (bound to 127.0.0.1 only — not publicly accessible).
# ===========================================================================

# Slot definitions — uncomment and configure as needed.
# The 'name' is for display only (hub dashboard, deploy status).
# The 'env_file' points to the slot-specific .env on the dev machine.

slots:
