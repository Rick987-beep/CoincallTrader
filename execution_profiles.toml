# ─────────────────────────────────────────────────────────────────────────────
# strangle_turb_best_effort — short_str_turb_dyn open/close
#
# Designed for strategies that tolerate an asymmetric (uneven) position after
# open execution.  Rationale: when selling a short strangle near entry_hour,
# it is more important to get into the trade than to guarantee symmetric fills.
# If one leg only partially fills, we accept the resulting position and start
# monitoring SL/TP immediately rather than unwinding and missing the trade.
#
# Open (two phases, total ≤ 75 min):
#   Phase 1 — 60 min at fair price (aggression=0), reprice every 5 min.
#             Goal: post at a sensible price (~mark or ~ask) and wait patiently
#             for a buyer.  min_floor_price=0.0002 prevents fills below 2× min tick.
#             When bid=0 and ask=0.0005 the pricing engine quotes at mark≈0.0003
#             automatically — no special logic needed.
#   Phase 2 — 15 min, gently nudge toward bid (aggression=0.33), reprice every 2 min.
#             Goal: close any remaining gap without crossing below the price floor.
#   On exhaustion: accept whatever structure filled (open_best_effort_exhaustion=true).
#   If nothing filled at all, the trade is still marked FAILED.
#
# Close: standard 2-phase (fair then aggressive), matching delta_strangle_2phase.
# ─────────────────────────────────────────────────────────────────────────────
[profile.strangle_turb_best_effort]
open_atomic                 = false   # don't abort if a leg can't be priced at placement
open_best_effort_exhaustion = true    # accept partial fills on phase exhaustion (not unwind)
close_best_effort           = true
rfq_mode                    = "never"

[profile.strangle_turb_best_effort.open_phase_1]
pricing          = "fair"
fair_aggression  = 0.0
duration_seconds = 3600.0  # 60 min — wait patiently for a buyer at fair price
reprice_interval = 300.0   # reprice every 5 min (no need to hammer)
min_floor_price  = 0.0002  # never post below 2× min tick

[profile.strangle_turb_best_effort.open_phase_2]
pricing          = "fair"
fair_aggression  = 0.33    # gentle nudge toward bid — not a full cross
duration_seconds = 900.0   # 15 min
reprice_interval = 120.0   # reprice every 2 min
min_floor_price  = 0.0002  # hold the floor through phase 2 as well

[profile.strangle_turb_best_effort.close_phase_1]
pricing          = "fair"
fair_aggression  = 0.0
duration_seconds = 30.0
reprice_interval = 30.0

[profile.strangle_turb_best_effort.close_phase_2]
pricing          = "fair"
fair_aggression  = 1.0
duration_seconds = 60.0
reprice_interval = 15.0
min_floor_price  = 0.0001
