# ─────────────────────────────────────────────────────────────────────────────
# supertrend_long_call — supertrend_long_call open/close
#
# Single long-call leg driven by a SuperTrend flip on 1h BTCUSDT bars.
# Signal-driven (not time-driven), so both open and close must succeed
# decisively — we don't want to miss an entry on a flip-up or fail to
# close after a flip-down.
#
# Open (two phases, total ≤ 210s):
#   Phase 1 — 30s at fair price (aggression 0.0): try the mid/mark.
#   Phase 2 — 180s aggressive past ask with a 2% buffer: ensure we get filled.
#
# Close (two phases, total ≤ 210s):
#   Phase 1 — 30s at fair price (aggression 0.0): try the mid/mark.
#   Phase 2 — 180s aggressive past bid with a 2% buffer: ensure we close.
# ─────────────────────────────────────────────────────────────────────────────
[profile.supertrend_long_call]
open_atomic = true
close_best_effort = true
rfq_mode = "never"

[profile.supertrend_long_call.open_phase_1]
pricing = "fair"
fair_aggression = 0.0
duration_seconds = 30.0
reprice_interval = 30.0

[profile.supertrend_long_call.open_phase_2]
pricing = "aggressive"
duration_seconds = 180.0
buffer_pct = 2.0
reprice_interval = 30.0

[profile.supertrend_long_call.close_phase_1]
pricing = "fair"
fair_aggression = 0.0
duration_seconds = 30.0
reprice_interval = 30.0

[profile.supertrend_long_call.close_phase_2]
pricing = "aggressive"
duration_seconds = 180.0
buffer_pct = 2.0
reprice_interval = 30.0

