# ===========================================================================
# Slot 01 — SuperTrend Long Call (Coincall)
#
# Buys a single ~30 DTE / ~0.50 delta BTC call when SuperTrend(7, 3) on 1h
# BTCUSDT (Binance) flips from -1 to +1.  Closes when SuperTrend trend
# turns -1 on the latest fully closed 1h bar (steady-state — never misses
# a close signal after a restart).
#
# Indicator data: Binance public klines (cached).  No options stream needed.
# Execution profile: supertrend_long_call (open: 30s fair → 180s aggressive;
#                                          close: 30s fair → 180s aggressive).
# Reference: docs/Backtest_Report_SuperTrend_DTE30_Delta05_EN.md
#
# Edit params below, then deploy:
#   ./deployment/deploy-slot.sh 01
# ===========================================================================

name = "SuperTrend Long Call"
strategy = "supertrend_long_call"
account = "coincall-main"

[params]
qty            = 0.1   # BTC per leg (~1 BTC notional, matches backtest)
target_delta   = 0.50  # near-ATM call
target_dte     = 30    # nearest expiry to this many days
dte_min        = 7     # acceptable expiry window — min
dte_max        = 60    # acceptable expiry window — max
st_period      = 7     # SuperTrend ATR SMA window (per backtest)
st_multiplier  = 3     # SuperTrend band multiplier (per backtest)
check_interval = 15    # seconds between entry/exit evaluations (≤ bar-close detection latency)
