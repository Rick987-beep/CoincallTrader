<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CryoTrader — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: #0d1117; color: #c9d1d9; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
            padding: 2rem; width: 340px; }
    h1 { font-size: 1.2rem; margin-bottom: 1.5rem; text-align: center; color: #58a6ff; }
    label { display: block; font-size: 0.85rem; margin-bottom: 0.3rem; color: #8b949e; }
    input[type="password"] { width: 100%; padding: 0.6rem; border: 1px solid #30363d;
                             border-radius: 4px; background: #0d1117; color: #c9d1d9;
                             font-size: 0.95rem; margin-bottom: 1rem; }
    input:focus { outline: none; border-color: #58a6ff; }
    button { width: 100%; padding: 0.6rem; background: #238636; border: none;
             border-radius: 4px; color: #fff; font-size: 0.95rem; cursor: pointer; }
    button:hover { background: #2ea043; }
    .error { color: #f85149; font-size: 0.85rem; margin-bottom: 1rem; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>CryoTrader</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
      <label for="password">Dashboard Password</label>
      <input type="password" id="password" name="password" autofocus required>
      <button type="submit">Log In</button>
    </form>
  </div>
</body>
</html>
